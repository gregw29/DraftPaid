<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-M1Q2BRZ5VS"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Invoice History — DraftPaid</title>
  <meta name="description" content="View and manage all your invoices with DraftPaid Pro."/>
  <meta name="robots" content="noindex"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --ink:      #0f0e0c;
      --paper:    #f5f2eb;
      --cream:    #ede9de;
      --gold:     #c9a84c;
      --gold-lt:  #e8d49a;
      --rust:     #b84c2a;
      --muted:    #7a7469;
      --border:   #d4cfc4;
      --white:    #ffffff;
      --green:    #2d7a4f;
      --shadow:   0 2px 12px rgba(15,14,12,.08);
      --shadow-lg:0 8px 40px rgba(15,14,12,.14);
      --radius:   4px;
      --font-head:"DM Serif Display", Georgia, serif;
      --font-body:"DM Sans", sans-serif;
      --font-mono:"DM Mono", monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background: var(--paper); color: var(--ink); min-height: 100vh; }

    /* ── HEADER ── */
    header {
      background: var(--ink); color: var(--paper);
      padding: 0 2rem; display: flex; align-items: center;
      justify-content: space-between; height: 56px;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { font-family: var(--font-head); font-size: 1.3rem; letter-spacing: .03em; color: var(--gold-lt); text-decoration: none; }
    .logo span { color: var(--paper); font-style: italic; }
    .header-right { display: flex; align-items: center; gap: .75rem; }
    .btn-back { font-family: var(--font-mono); font-size: .72rem; letter-spacing: .06em; color: rgba(247,244,239,.5); text-decoration: none; transition: color .15s; }
    .btn-back:hover { color: var(--gold-lt); }
    .account-menu { display: flex; align-items: center; gap: .5rem; font-size: .75rem; font-family: var(--font-mono); }
    .account-email { color: rgba(247,244,239,.45); letter-spacing: .03em; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-signout { background: transparent; border: 1px solid rgba(247,244,239,.2); color: rgba(247,244,239,.45); font-size: .68rem; font-family: var(--font-mono); letter-spacing: .05em; padding: .2rem .55rem; border-radius: 3px; cursor: pointer; transition: all .15s; }
    .btn-signout:hover { border-color: var(--gold-lt); color: var(--gold-lt); }

    /* ── LAYOUT ── */
    .app { max-width: 900px; margin: 0 auto; padding: 2.5rem 1.5rem 6rem; }

    /* ── PAGE TITLE ── */
    .page-title-row { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.75rem; }
    .page-title { font-family: var(--font-head); font-size: 1.75rem; }

    /* ── STATS BAR ── */
    .stats-bar {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 1rem; margin-bottom: 1.75rem;
    }
    .stat-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 1rem 1.25rem;
    }
    .stat-label { font-family: var(--font-mono); font-size: .65rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: .4rem; }
    .stat-value { font-family: var(--font-head); font-size: 1.5rem; color: var(--ink); }
    .stat-value.green { color: var(--green); }
    .stat-value.gold  { color: var(--gold); }

    /* ── SEARCH + FILTERS ── */
    .toolbar { display: flex; gap: .75rem; flex-wrap: wrap; align-items: center; margin-bottom: 1.25rem; }
    .search-input {
      flex: 1; min-width: 200px; font-family: var(--font-body); font-size: .88rem;
      background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius);
      padding: .55rem .9rem; color: var(--ink); transition: border-color .15s;
    }
    .search-input:focus { outline: none; border-color: var(--gold); }
    .filter-tabs { display: flex; gap: .4rem; }
    .filter-tab {
      font-family: var(--font-mono); font-size: .7rem; letter-spacing: .07em; text-transform: uppercase;
      padding: .3rem .85rem; border-radius: 20px; border: 1.5px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer; transition: all .15s;
    }
    .filter-tab.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .filter-tab:hover:not(.active) { border-color: var(--gold); color: var(--gold); }

    /* ── INVOICE CARDS ── */
    .invoices-list { display: flex; flex-direction: column; gap: .75rem; }
    .invoice-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 1.1rem 1.5rem;
      display: flex; align-items: center; gap: 1.25rem; flex-wrap: wrap;
    }
    .inv-card-number {
      font-family: var(--font-mono); font-size: .82rem; font-weight: 500;
      color: var(--ink); min-width: 90px; white-space: nowrap;
    }
    .inv-card-client {
      flex: 1; min-width: 120px;
    }
    .inv-card-client-name { font-size: .92rem; font-weight: 600; }
    .inv-card-date { font-family: var(--font-mono); font-size: .72rem; color: var(--muted); margin-top: .15rem; }
    .inv-card-amount {
      font-family: var(--font-mono); font-size: .95rem; font-weight: 500;
      white-space: nowrap; min-width: 80px; text-align: right;
    }
    .status-badge {
      font-family: var(--font-mono); font-size: .65rem; letter-spacing: .09em;
      text-transform: uppercase; padding: .25rem .7rem; border-radius: 20px;
      white-space: nowrap; font-weight: 500;
    }
    .status-draft   { background: var(--cream);  color: var(--muted);  border: 1px solid var(--border); }
    .status-unpaid  { background: #fef3cd;        color: #7a5a00;       border: 1px solid #f0c040; }
    .status-paid    { background: #d4edda;        color: #1a5c30;       border: 1px solid #7abe91; }

    /* ── CARD ACTIONS ── */
    .inv-card-actions { display: flex; gap: .4rem; flex-wrap: wrap; }
    .btn-action {
      font-family: var(--font-mono); font-size: .68rem; letter-spacing: .05em;
      padding: .3rem .65rem; border-radius: 3px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .btn-action:hover { border-color: var(--gold); color: var(--gold); }
    .btn-action.primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .btn-action.primary:hover { background: var(--gold); color: var(--ink); border-color: var(--gold); }
    .btn-action.danger:hover { border-color: var(--rust); color: var(--rust); }

    /* ── EMPTY / LOADING / UPGRADE ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 22px; height: 22px; border-radius: 50%; border: 3px solid var(--border); border-top-color: var(--gold); animation: spin .7s linear infinite; margin: 3rem auto; }
    .empty-state { text-align: center; padding: 4rem 2rem; background: var(--white); border: 1.5px dashed var(--border); border-radius: var(--radius); }
    .empty-icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .empty-title { font-family: var(--font-head); font-size: 1.3rem; margin-bottom: .6rem; }
    .empty-body { font-size: .9rem; color: var(--muted); line-height: 1.65; max-width: 380px; margin: 0 auto 1.5rem; }
    .btn-primary {
      font-family: var(--font-body); font-size: .82rem; font-weight: 600;
      letter-spacing: .06em; text-transform: uppercase;
      padding: .55rem 1.2rem; background: var(--gold); color: var(--ink);
      border: none; border-radius: var(--radius); cursor: pointer;
      transition: all .18s; text-decoration: none; display: inline-block;
    }
    .btn-primary:hover { background: #b8942f; transform: translateY(-1px); }
    .upgrade-wall { text-align: center; padding: 4rem 2rem; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
    .upgrade-wall-icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .upgrade-wall-title { font-family: var(--font-head); font-size: 1.5rem; margin-bottom: .75rem; }
    .upgrade-wall-body { font-size: .92rem; color: var(--muted); line-height: 1.65; max-width: 400px; margin: 0 auto 1.75rem; }

    /* ── DELETE MODAL ── */
    .modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(15,14,12,.7); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    .modal-overlay.hidden { display: none; }
    .modal-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow-lg); width: 100%; max-width: 420px; }
    .modal-header { background: var(--cream); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-family: var(--font-mono); font-size: .72rem; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
    .modal-close { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: .2rem .4rem; border-radius: 3px; transition: all .15s; line-height: 1; }
    .modal-close:hover { background: var(--ink); color: var(--paper); }
    .modal-body { padding: 1.5rem; }
    .modal-footer { border-top: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; justify-content: flex-end; gap: .75rem; }
    .confirm-msg { font-size: .92rem; color: var(--ink); line-height: 1.6; margin-bottom: .5rem; }
    .confirm-note { font-size: .8rem; color: var(--muted); }
    .btn-cancel { font-family: var(--font-body); font-size: .82rem; padding: .55rem 1.2rem; border-radius: var(--radius); border: 1.5px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all .15s; }
    .btn-cancel:hover { border-color: var(--ink); color: var(--ink); }
    .btn-delete { font-family: var(--font-body); font-size: .82rem; font-weight: 600; padding: .55rem 1.2rem; border-radius: var(--radius); border: none; background: var(--rust); color: var(--white); cursor: pointer; transition: all .15s; }
    .btn-delete:hover { background: #a03420; }

    /* ── TOAST ── */
    .toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--ink); color: var(--paper); padding: .8rem 1.4rem; border-radius: var(--radius); font-size: .85rem; font-family: var(--font-mono); letter-spacing: .04em; box-shadow: var(--shadow-lg); opacity: 0; transform: translateY(8px); transition: all .25s ease; pointer-events: none; z-index: 999; }
    .toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 640px) {
      header { padding: 0 1rem; }
      .app { padding: 1.5rem .75rem 4rem; }
      .stats-bar { grid-template-columns: 1fr 1fr; }
      .invoice-card { padding: .9rem 1rem; }
      .inv-card-actions { width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo"><span>Draft</span>Paid</a>
  <div class="header-right">
    <a href="invoice-generator.html" class="btn-back">← Back to Invoice</a>
    <div class="account-menu" id="account-menu"></div>
  </div>
</header>

<div class="app" id="app">
  <div class="spinner"></div>
</div>

<!-- ── DELETE CONFIRM MODAL ── -->
<div class="modal-overlay hidden" id="delete-modal" onclick="if(event.target===this)closeDeleteModal()">
  <div class="modal-card">
    <div class="modal-header">
      <span class="modal-title">Delete Invoice</span>
      <button class="modal-close" onclick="closeDeleteModal()">✕</button>
    </div>
    <div class="modal-body">
      <p class="confirm-msg">Delete invoice <strong id="delete-inv-num">this invoice</strong>?</p>
      <p class="confirm-note">The invoice will be removed from your history. This action cannot be undone.</p>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn-delete" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  /* ── SUPABASE ── */
  const SUPA_URL = 'https://cvgbtprhovdtwygzilyx.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2Z2J0cHJob3ZkdHd5Z3ppbHl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NTY1MTIsImV4cCI6MjA5MDMzMjUxMn0.iYuluH3j3b8bTT0UzHH9SxcHksycPMee0En4UEZvIy0';
  const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);

  /* ── STATE ── */
  let currentUser    = null;
  let allInvoices    = [];
  let activeFilter   = 'all';
  let searchQuery    = '';
  let deleteTargetId = null;

  /* ── INIT ── */
  window.addEventListener('DOMContentLoaded', async () => {
    const { data: { user } } = await sb.auth.getUser();
    currentUser = user;
    updateAccountMenu(user?.email || null);

    if (!user) { renderNoAuth(); return; }

    const { data: sub } = await sb
      .from('subscriptions').select('status').eq('email', user.email).single();

    if (sub?.status !== 'pro') { renderUpgradeWall(); return; }

    renderPage();
    await loadInvoices();
  });

  /* ── ACCOUNT MENU ── */
  function updateAccountMenu(email) {
    const menu = document.getElementById('account-menu');
    if (!menu) return;
    if (email) {
      menu.innerHTML =
        `<span class="account-email">${escHtml(email)}</span>` +
        `<button class="btn-signout" onclick="signOut()">Sign Out</button>`;
    }
  }
  async function signOut() { await sb.auth.signOut(); window.location.href = 'auth.html'; }

  /* ── PAGE SHELLS ── */
  function renderNoAuth() {
    document.getElementById('app').innerHTML = `
      <div class="upgrade-wall">
        <div class="upgrade-wall-icon">🔒</div>
        <h2 class="upgrade-wall-title">Sign in to view your invoices</h2>
        <p class="upgrade-wall-body">Create a free DraftPaid account to get started.</p>
        <a href="auth.html" class="btn-primary">Sign In →</a>
      </div>`;
  }

  function renderUpgradeWall() {
    document.getElementById('app').innerHTML = `
      <div class="upgrade-wall">
        <div class="upgrade-wall-icon">📄</div>
        <h2 class="upgrade-wall-title">Invoice History is a Pro feature</h2>
        <p class="upgrade-wall-body">
          Automatically save every invoice you create, track payment status,
          and re-open any past invoice in the generator.
          Upgrade to DraftPaid Pro to unlock invoice history.
        </p>
        <a href="https://buy.stripe.com/8x2cN5gB5ekDet1bHFgnK00" class="btn-primary">Upgrade to Pro — $9/month →</a>
      </div>`;
  }

  function renderPage() {
    document.getElementById('app').innerHTML = `
      <div class="page-title-row">
        <h1 class="page-title">Invoice History</h1>
      </div>

      <div class="stats-bar" id="stats-bar">
        <div class="stat-card"><div class="stat-label">Total Invoices</div><div class="stat-value" id="stat-total">—</div></div>
        <div class="stat-card"><div class="stat-label">Paid</div><div class="stat-value green" id="stat-paid">—</div></div>
        <div class="stat-card"><div class="stat-label">Unpaid</div><div class="stat-value gold" id="stat-unpaid">—</div></div>
        <div class="stat-card"><div class="stat-label">Revenue</div><div class="stat-value green" id="stat-revenue">—</div></div>
      </div>

      <div class="toolbar">
        <input class="search-input" type="text" id="search-box" placeholder="Search by client or invoice number…" oninput="onSearch(this.value)" />
        <div class="filter-tabs">
          <button class="filter-tab active" data-filter="all"    onclick="setFilter('all')">All</button>
          <button class="filter-tab"        data-filter="draft"  onclick="setFilter('draft')">Draft</button>
          <button class="filter-tab"        data-filter="unpaid" onclick="setFilter('unpaid')">Unpaid</button>
          <button class="filter-tab"        data-filter="paid"   onclick="setFilter('paid')">Paid</button>
        </div>
      </div>

      <div class="invoices-list" id="invoices-list">
        <div class="spinner"></div>
      </div>`;
  }

  /* ── LOAD INVOICES ── */
  async function loadInvoices() {
    const { data, error } = await sb
      .from('invoices')
      .select('*')
      .eq('user_id', currentUser.id)
      .eq('is_deleted', false)
      .order('created_at', { ascending: false });

    if (error) {
      console.error('loadInvoices:', error);
      document.getElementById('invoices-list').innerHTML =
        '<div class="empty-state"><p class="empty-body">Error loading invoices.</p></div>';
      return;
    }

    allInvoices = data || [];
    updateStats();
    applyFilters();
  }

  /* ── STATS ── */
  function updateStats() {
    const total   = allInvoices.length;
    const paid    = allInvoices.filter(i => i.status === 'paid').length;
    const unpaid  = allInvoices.filter(i => i.status === 'unpaid').length;
    // Revenue: sum of paid invoices; mixed currency is MVP limitation — sums numerically
    const revenue = allInvoices
      .filter(i => i.status === 'paid')
      .reduce((s, i) => s + (parseFloat(i.total) || 0), 0);
    const sym = allInvoices.find(i => i.status === 'paid')?.currency || '$';

    const el = id => document.getElementById(id);
    if (el('stat-total'))   el('stat-total').textContent   = total;
    if (el('stat-paid'))    el('stat-paid').textContent    = paid;
    if (el('stat-unpaid'))  el('stat-unpaid').textContent  = unpaid;
    if (el('stat-revenue')) el('stat-revenue').textContent = sym + revenue.toFixed(2);
  }

  /* ── FILTER + SEARCH ── */
  function setFilter(f) {
    activeFilter = f;
    document.querySelectorAll('.filter-tab').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === f);
    });
    applyFilters();
  }

  function onSearch(q) {
    searchQuery = q.toLowerCase();
    applyFilters();
  }

  function applyFilters() {
    let list = allInvoices;
    if (activeFilter !== 'all') list = list.filter(i => i.status === activeFilter);
    if (searchQuery) {
      list = list.filter(i =>
        (i.invoice_number || '').toLowerCase().includes(searchQuery) ||
        (i.client_name    || '').toLowerCase().includes(searchQuery) ||
        (i.client_email   || '').toLowerCase().includes(searchQuery)
      );
    }
    renderInvoiceList(list);
  }

  /* ── RENDER CARDS ── */
  function renderInvoiceList(list) {
    const el = document.getElementById('invoices-list');
    if (!el) return;

    if (list.length === 0) {
      if (allInvoices.length === 0) {
        el.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📄</div>
            <h3 class="empty-title">No invoices yet</h3>
            <p class="empty-body">Create your first invoice to see it here. Invoices auto-save when you preview, download, or generate a payment link.</p>
            <a href="invoice-generator.html" class="btn-primary">Create an Invoice →</a>
          </div>`;
      } else {
        el.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><h3 class="empty-title">No results</h3><p class="empty-body">No invoices match your search or filter.</p></div>`;
      }
      return;
    }

    el.innerHTML = list.map(inv => {
      const num     = escHtml(inv.invoice_number || '—');
      const client  = escHtml(inv.client_name    || 'No client');
      const amount  = (inv.currency || '$') + parseFloat(inv.total || 0).toFixed(2);
      const date    = inv.invoice_date ? fmtDate(inv.invoice_date) : (inv.created_at ? fmtDate(inv.created_at) : '');
      const status  = inv.status || 'draft';
      const badgeCls = `status-badge status-${status}`;
      const badgeTxt = status.charAt(0).toUpperCase() + status.slice(1);

      const copyBtn = inv.payment_url
        ? `<button class="btn-action" onclick="copyPaymentLink('${escHtml(inv.payment_url)}')">Copy Link</button>`
        : '';

      return `
        <div class="invoice-card" data-id="${inv.id}">
          <div class="inv-card-number">${num}</div>
          <div class="inv-card-client">
            <div class="inv-card-client-name">${client}</div>
            <div class="inv-card-date">${date}</div>
          </div>
          <div class="inv-card-amount">${escHtml(amount)}</div>
          <span class="${badgeCls}">${badgeTxt}</span>
          <div class="inv-card-actions">
            <button class="btn-action primary" onclick="openInGenerator('${inv.id}')">Open →</button>
            ${copyBtn}
            <button class="btn-action" onclick="duplicateInvoice('${inv.id}')">Duplicate</button>
            <button class="btn-action danger" onclick="openDeleteModal('${inv.id}', '${num}')">Delete</button>
          </div>
        </div>`;
    }).join('');
  }

  /* ── OPEN IN GENERATOR ── */
  function openInGenerator(id) {
    const inv = allInvoices.find(i => i.id === id);
    if (!inv) return;
    sessionStorage.setItem('draftpaid_load_invoice', JSON.stringify(inv));
    window.location.href = 'invoice-generator.html';
  }

  /* ── COPY PAYMENT LINK ── */
  function copyPaymentLink(url) {
    navigator.clipboard.writeText(url)
      .then(() => toast('✓ Payment link copied!'))
      .catch(() => {
        const ta = document.createElement('textarea');
        ta.value = url; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        toast('✓ Copied!');
      });
  }

  /* ── DUPLICATE ── */
  async function duplicateInvoice(id) {
    const inv = allInvoices.find(i => i.id === id);
    if (!inv || !currentUser) return;

    // Generate a unique copy number using timestamp suffix
    const newNum = `${inv.invoice_number}-${Date.now().toString().slice(-5)}`;

    const { error } = await sb.from('invoices').insert({
      user_id:        currentUser.id,
      user_email:     inv.user_email,
      invoice_number: newNum,
      invoice_date:   inv.invoice_date,
      due_date:       inv.due_date,
      client_name:    inv.client_name,
      client_email:   inv.client_email,
      line_items:     inv.line_items,
      subtotal:       inv.subtotal,
      tax_rate:       inv.tax_rate,
      tax_amount:     inv.tax_amount,
      discount:       inv.discount,
      total:          inv.total,
      currency:       inv.currency,
      notes:          inv.notes,
      status:         'draft',      // always draft
      pay_now_enabled: false,
      payment_url:    null,         // cleared
      stripe_session_id: null,      // cleared
      paid_at:        null,         // cleared
    });

    if (error) { toast('Error duplicating invoice.'); console.error(error); return; }
    toast(`✓ Duplicated as ${newNum}`);
    await loadInvoices();
  }

  /* ── DELETE ── */
  function openDeleteModal(id, num) {
    deleteTargetId = id;
    document.getElementById('delete-inv-num').textContent = num;
    document.getElementById('delete-modal').classList.remove('hidden');
  }

  function closeDeleteModal() {
    deleteTargetId = null;
    document.getElementById('delete-modal').classList.add('hidden');
  }

  async function confirmDelete() {
    if (!deleteTargetId || !currentUser) return;
    const { error } = await sb
      .from('invoices')
      .update({ is_deleted: true })
      .eq('id', deleteTargetId)
      .eq('user_id', currentUser.id);

    if (error) { toast('Error deleting invoice.'); return; }
    closeDeleteModal();
    toast('✓ Invoice deleted.');
    await loadInvoices();
  }

  /* ── HELPERS ── */
  function fmtDate(d) {
    if (!d) return '';
    const dt = new Date(d);
    if (isNaN(dt)) return d;
    return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function escHtml(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
  }
</script>
</body>
</html>
